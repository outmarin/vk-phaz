name: VKPhaz
options:
  bundleIdPrefix: com.vkphaz
  deploymentTarget:
    iOS: "26.0"
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "2"
packages:
  LLM:
    url: https://github.com/eastriverlee/LLM.swift
    branch: main
targets:
  VKPhaz:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: LLM
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vkphaz.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: TK
        UILaunchScreen: {}
        NSPhotoLibraryUsageDescription: Для отправки фотографий в чат.
        NSMicrophoneUsageDescription: Для записи голосовых сообщений.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
