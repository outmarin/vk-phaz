name: VKPhaz
options:
  bundleIdPrefix: com.vkphaz
  deploymentTarget:
    iOS: "16.0"
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  VKPhaz:
    type: application
    platform: iOS
    sources:
      - App/Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: VK Phaz
        UILaunchScreen: {}
        # Security: block plaintext HTTP, only TLS to VK.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vkphaz.app
