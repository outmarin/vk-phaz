name: Build IPA
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK, Liquid Glass)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected: $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -project VKPhaz.xcodeproj \
            -scheme VKPhaz \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/VKPhaz.app Payload/
          zip -qr VKPhaz.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: VKPhaz-ipa
          path: VKPhaz.ipa
